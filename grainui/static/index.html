<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrainRX UI - Film Grain Test Harness</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; color: #eee; padding: 20px;
        }
        h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Upload section */
        .upload-section {
            background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px;
            text-align: center; border: 2px dashed #0f3460;
        }
        .upload-section input[type="file"] { display: none; }
        .upload-btn {
            background: #e94560; color: white; padding: 12px 24px; border-radius: 4px;
            cursor: pointer; display: inline-block;
        }
        .upload-section:hover { border-color: #e94560; }
        
        /* Controls grid */
        .controls {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px; background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 12px; color: #aaa; }
        .control-group select, .control-group input[type="number"] {
            background: #0f3460; border: 1px solid #1a1a2e; color: #eee;
            padding: 8px; border-radius: 4px; width: 100%;
        }
        .control-group input[type="range"] {
            width: 100%; accent-color: #e94560;
        }
        .control-group .value-display { font-size: 11px; color: #e94560; }
        
        /* Checkbox group */
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; }
        
        /* Render button */
        .render-btn {
            background: #e94560; color: white; border: none; padding: 15px 30px;
            font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%;
            margin-bottom: 20px; transition: background 0.2s;
        }
        .render-btn:hover { background: #ff6b6b; }
        .render-btn:disabled { background: #555; cursor: not-allowed; }
        
        /* Comparison view */
        .comparison {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
        }
        @media (max-width: 900px) { .comparison { grid-template-columns: 1fr; } }
        .image-panel { background: #16213e; padding: 15px; border-radius: 8px; }
        .image-panel h3 { margin-bottom: 10px; font-size: 14px; color: #aaa; }
        .image-container {
            background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 50% / 20px 20px;
            border-radius: 4px; overflow: hidden; min-height: 200px; display: flex; align-items: center; justify-content: center;
        }
        .image-container img { max-width: 100%; max-height: 500px; display: block; }
        
        /* Status */
        .status { padding: 10px 15px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
        .status.loading { background: #f39c12; color: #000; }
        .status.success { background: #27ae60; }
        .status.error { background: #e74c3c; }
        
        /* Info bar */
        .info-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #0f3460; border-radius: 4px; margin-bottom: 20px; font-size: 13px; }
        .info-bar span { color: #aaa; }
        .info-bar .highlight { color: #e94560; font-weight: bold; }
        
        /* Range markers */
        .range-markers { display: flex; justify-content: space-between; font-size: 10px; color: #666; margin-top: -10px; padding: 0 2px; }
        .range-markers span { flex: 1; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 GrainRX UI</h1>
        
        <!-- Upload -->
        <div class="upload-section">
            <label class="upload-btn">
                📁 Choose Image
                <input type="file" id="imageInput" accept="image/*">
            </label>
            <p style="margin-top: 10px; color: #888; font-size: 12px;">No image selected</p>
        </div>
        
        <!-- Controls -->
        <div class="controls">
            <div class="control-group">
                <label>Film Profile</label>
                <select id="profile"></select>
            </div>
            
            <div class="control-group">
                <label>Renderer</label>
                <select id="renderer">
                    <option value="fast">Fast (Analytical)</option>
                    <option value="mc">Monte Carlo (High Quality)</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Mu R (Mean Grain Radius): <span id="mu_r_val" class="value-display">0.07</span></label>
                <input type="range" id="mu_r" min="0.01" max="0.2" step="0.001" value="0.07">
                <div class="range-markers"><span>Fine</span><span>Moderate</span><span>Coarse</span><span>Extreme</span></div>
            </div>
            
            <div class="control-group">
                <label>Sigma R (Grain Variation): <span id="sigma_r_val" class="value-display">0.025</span></label>
                <input type="range" id="sigma_r" min="0" max="0.1" step="0.001" value="0.025">
            </div>
            
            <div class="control-group">
                <label>Filter Sigma (Softness): <span id="filter_sigma_val" class="value-display">0.8</span></label>
                <input type="range" id="filter_sigma" min="0.3" max="2.0" step="0.1" value="0.8">
            </div>
            
            <div class="control-group">
                <label>MC Samples (for Monte Carlo): <span id="mc_samples_val" class="value-display">100</span></label>
                <input type="range" id="mc_samples" min="10" max="500" step="10" value="100">
            </div>
            
            <div class="control-group">
                <label>Zoom: <span id="zoom_val" class="value-display">1.0</span></label>
                <input type="range" id="zoom" min="0.5" max="4.0" step="0.1" value="1.0">
            </div>
            
            <div class="control-group">
                <label>Seed: <span id="seed_val" class="value-display">42</span></label>
                <input type="number" id="seed" min="0" value="42">
            </div>
            
            <div class="control-group checkbox-group">
                <input type="checkbox" id="bw_mode">
                <label for="bw_mode">B&W Mode</label>
            </div>
            
            <div class="control-group checkbox-group">
                <input type="checkbox" id="save_result" checked>
                <label for="save_result">Save Result</label>
            </div>
        </div>
        
        <!-- Render Button -->
        <button class="render-btn" id="renderBtn" disabled>🎨 Render Grain</button>
        
        <!-- Status -->
        <div id="status" style="display: none;"></div>
        
        <!-- Info Bar -->
        <div class="info-bar" id="infoBar" style="display: none;">
            <span>Renderer: <span id="info_renderer" class="highlight"></span></span>
            <span>Time: <span id="info_time" class="highlight"></span></span>
        </div>
        
        <!-- Comparison -->
        <div class="comparison">
            <div class="image-panel">
                <h3>Original</h3>
                <div class="image-container">
                    <img id="originalImg" style="display: none;">
                    <span id="originalPlaceholder" style="color: #666;">Upload an image</span>
                </div>
            </div>
            <div class="image-panel">
                <h3>Result</h3>
                <div class="image-container">
                    <img id="resultImg" style="display: none;">
                    <span id="resultPlaceholder" style="color: #666;">Render to see result</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let uploadedImage = null;
        
        // DOM elements
        const imageInput = document.getElementById('imageInput');
        const profileSelect = document.getElementById('profile');
        const renderBtn = document.getElementById('renderBtn');
        const statusDiv = document.getElementById('status');
        const originalImg = document.getElementById('originalImg');
        const resultImg = document.getElementById('resultImg');
        
        // Value display elements
        const valueDisplays = {
            mu_r: document.getElementById('mu_r_val'),
            sigma_r: document.getElementById('sigma_r_val'),
            filter_sigma: document.getElementById('filter_sigma_val'),
            mc_samples: document.getElementById('mc_samples_val'),
            zoom: document.getElementById('zoom_val'),
            seed: document.getElementById('seed_val'),
        };
        
        // Load profiles on startup
        async function loadProfiles() {
            try {
                const res = await fetch(`${API_BASE}/profiles`);
                const data = await res.json();
                profileSelect.innerHTML = data.profiles.map(p => 
                    `<option value="${p.name}">${p.display_name || p.name} (${p.mu_r})</option>`
                ).join('');
            } catch (e) {
                console.error('Failed to load profiles:', e);
            }
        }
        
        // Update value displays
        Object.keys(valueDisplays).forEach(key => {
            const el = document.getElementById(key);
            if (el) {
                el.addEventListener('input', () => {
                    valueDisplays[key].textContent = 
                        el.type === 'number' ? el.value : parseFloat(el.value).toFixed(3);
                });
            }
        });
        
        // Image upload handler
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                uploadedImage = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    originalImg.src = ev.target.result;
                    originalImg.style.display = 'block';
                    document.getElementById('originalPlaceholder').style.display = 'none';
                    renderBtn.disabled = false;
                };
                reader.readAsDataURL(file);
                e.target.previousElementSibling.textContent = `📁 ${file.name}`;
            }
        });
        
        // Render handler
        renderBtn.addEventListener('click', async () => {
            if (!uploadedImage) return;
            
            renderBtn.disabled = true;
            renderBtn.textContent = '⏳ Rendering...';
            showStatus('loading', 'Rendering grain... this may take up to 30 seconds for Monte Carlo.');
            
            const formData = new FormData();
            formData.append('image', uploadedImage);
            formData.append('profile', profileSelect.value);
            formData.append('renderer', document.getElementById('renderer').value);
            formData.append('mu_r', document.getElementById('mu_r').value);
            formData.append('sigma_r', document.getElementById('sigma_r').value);
            formData.append('filter_sigma', document.getElementById('filter_sigma').value);
            formData.append('mc_samples', document.getElementById('mc_samples').value);
            formData.append('zoom', document.getElementById('zoom').value);
            formData.append('seed', document.getElementById('seed').value);
            formData.append('bw_mode', document.getElementById('bw_mode').checked);
            formData.append('save_result', document.getElementById('save_result').checked);
            
            try {
                const res = await fetch(`${API_BASE}/render`, { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    resultImg.src = `${API_BASE}${data.result_url}?t=${Date.now()}`;
                    resultImg.style.display = 'block';
                    document.getElementById('resultPlaceholder').style.display = 'none';
                    
                    // Show info bar
                    document.getElementById('infoBar').style.display = 'flex';
                    document.getElementById('info_renderer').textContent = data.renderer === 'mc' ? 'Monte Carlo' : 'Fast (Analytical)';
                    document.getElementById('info_time').textContent = `${data.render_time}s`;
                    
                    showStatus('success', `Rendered in ${data.render_time}s`);
                } else {
                    throw new Error(data.error || 'Render failed');
                }
            } catch (e) {
                showStatus('error', `Error: ${e.message}`);
            }
            
            renderBtn.disabled = false;
            renderBtn.textContent = '🎨 Render Grain';
        });
        
        function showStatus(type, message) {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }
        
        // Initialize
        loadProfiles();
    </script>
</body>
</html>
